services:
  - type: web
    name: ecommerce-backend
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: PAYMENT_PROVIDER_BASE_URL
        sync: false
      - key: PAYMENT_PROVIDER_PUBLIC_KEY
        sync: false
      - key: PAYMENT_PROVIDER_PRIVATE_KEY
        sync: false
      - key: PAYMENT_PROVIDER_EVENTS_KEY
        sync: false
      - key: PAYMENT_PROVIDER_INTEGRITY_SECRET
        sync: false
      - key: PAYMENT_PROVIDER_MERCHANT_ID
        sync: false

databases:
  - name: ecommerce-db
    plan: free
    databaseName: ecommerce_db
    user: postgres
